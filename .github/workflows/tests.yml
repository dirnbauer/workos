name: Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    static-analysis:
        name: Static analysis (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.2', '8.3', '8.4']
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP ${{ matrix.php }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  tools: composer:v2

            - name: Composer cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/composer
                  key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
                  restore-keys: composer-${{ matrix.php }}-

            - name: Install dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: PHPStan (level max + phpat)
              run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress --error-format=github

    unit-tests:
        name: Unit tests (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.2', '8.3', '8.4']
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP ${{ matrix.php }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: pcov
                  tools: composer:v2

            - name: Composer cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/composer
                  key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
                  restore-keys: composer-${{ matrix.php }}-

            - name: Install dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: PHPUnit unit suite
              run: Build/Scripts/runTests.sh -s unit

    functional-tests:
        name: Functional tests (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        needs: [unit-tests]
        strategy:
            fail-fast: false
            matrix:
                php: ['8.3']
        services:
            mariadb:
                image: mariadb:10.11
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: typo3_test
                ports: ['3306:3306']
                options: >-
                    --health-cmd="mariadb-admin ping -proot"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
        env:
            typo3DatabaseDriver: mysqli
            typo3DatabaseHost: 127.0.0.1
            typo3DatabasePort: 3306
            typo3DatabaseUsername: root
            typo3DatabasePassword: root
            typo3DatabaseName: typo3_test
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP ${{ matrix.php }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: PHPUnit functional suite
              run: Build/Scripts/runTests.sh -s functional

    security-audit:
        name: Composer audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP 8.3
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: none
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: Audit direct + transitive deps
              run: composer audit --no-dev=false

    mutation:
        name: Mutation testing
        runs-on: ubuntu-latest
        needs: [unit-tests]
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP 8.3
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: pcov
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: Infection
              env:
                  STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
              run: Build/Scripts/runTests.sh -s mutation
