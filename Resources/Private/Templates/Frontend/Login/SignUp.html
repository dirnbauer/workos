<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<div class="workos-auth-plugin" style="max-width:400px;">
    <f:if condition="{configured}">
        <f:then>
            <div class="workos-auth-card" style="border:1px solid #e5e7eb; border-radius:12px; padding:1.5rem; background:#fff;">
                <div style="text-align:center; margin-bottom:1.25rem;">
                    <p style="font-size:1.15rem; font-weight:700; margin:0 0 0.25rem;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.title" /></p>
                    <p style="font-size:0.85rem; color:#6b7280; margin:0;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.subtitle" /></p>
                </div>

                <f:if condition="{authError}">
                    <div class="alert alert-danger" style="font-size:0.9rem; margin-bottom:1rem; padding:0.75rem 1rem; border-radius:8px; background:#fef2f2; border:1px solid #fecaca; color:#991b1b;">{authError}</div>
                </f:if>

                <f:form action="signUpSubmit" method="post" style="margin-bottom:0;">
                    <f:form.hidden name="returnTo" value="/" />

                    <div style="display:flex; gap:0.5rem; margin-bottom:0.75rem;">
                        <div style="flex:1;">
                            <label for="workos-first-name" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.firstName" /></label>
                            <input id="workos-first-name" type="text" name="firstName" value="{savedFirstName}" autocomplete="given-name" placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.firstNamePlaceholder')}"
                                   style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                        </div>
                        <div style="flex:1;">
                            <label for="workos-last-name" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.lastName" /></label>
                            <input id="workos-last-name" type="text" name="lastName" value="{savedLastName}" autocomplete="family-name" placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.lastNamePlaceholder')}"
                                   style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                        </div>
                    </div>

                    <div style="margin-bottom:0.75rem;">
                        <label for="workos-signup-email" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.email" /></label>
                        <input id="workos-signup-email" type="email" name="email" value="{savedEmail}" required autocomplete="email" placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.emailPlaceholder')}"
                               style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                    </div>

                    <div style="margin-bottom:0.25rem;">
                        <label for="workos-signup-password" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.password" /></label>
                        <input id="workos-signup-password" type="password" name="password" required autocomplete="new-password" minlength="10"
                               placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.passwordPlaceholder')}"
                               style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                    </div>
                    <p style="font-size:0.75rem; color:#9ca3af; margin:0 0 0.75rem; line-height:1.4;">
                        <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.passwordHint" />
                    </p>

                    <div style="margin-bottom:1rem;">
                        <label for="workos-signup-password-confirm" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.confirmPassword" /></label>
                        <input id="workos-signup-password-confirm" type="password" name="passwordConfirm" required autocomplete="new-password" minlength="10"
                               placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.passwordConfirmPlaceholder')}"
                               style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%; padding:0.6rem; border-radius:8px; font-weight:600; font-size:0.95rem; border:none; cursor:pointer;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.submit" /></button>
                </f:form>

                <div style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:#6b7280;">
                    <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.hasAccount" />
                    <f:link.action action="show" style="color:#4f46e5; font-weight:600; text-decoration:none;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.signup.signIn" /></f:link.action>
                </div>
            </div>
        </f:then>
        <f:else>
            <div class="alert alert-warning" style="border-radius:12px; padding:1rem;">
                <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.notConfigured" />
            </div>
        </f:else>
    </f:if>
</div>
</html>
