<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<style>
.workos-social-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.workos-social-btn {
    flex: 1;
    min-width: calc(50% - 0.25rem);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.55rem 0.75rem;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    color: #374151;
    background: #fff;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
}
.workos-social-btn:hover, .workos-social-btn:focus { background: #f9fafb; border-color: #9ca3af; text-decoration: none; color: #111827; }
.workos-social-btn__icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.workos-social-btn__icon svg { display: block; }
@media (max-width: 480px) {
    .workos-social-row { gap: 0.4rem; }
    .workos-social-btn { flex: 1; min-width: 0; padding: 0.55rem; }
    .workos-social-btn__label { display: none; }
}
</style>

<div class="workos-auth-plugin" style="max-width:400px;">
    <f:if condition="{configured}">
        <f:then>
            <f:if condition="{isLoggedIn}">
                <div class="workos-auth-card" style="border:1px solid #e5e7eb; border-radius:12px; padding:1.5rem; background:#fff;">
                    <div style="text-align:center; margin-bottom:1rem;">
                        <f:if condition="{workosProfile.profilePictureUrl}">
                            <img src="{workosProfile.profilePictureUrl}" alt="" style="width:56px; height:56px; border-radius:50%; margin-bottom:0.75rem;" />
                        </f:if>
                        <p style="margin:0; font-size:1.05rem;">
                            <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.signedIn" />
                            <f:if condition="{displayName}">
                                <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.signedInAs" /> <strong>{displayName}</strong>
                            </f:if>
                        </p>
                    </div>
                    <a href="{logoutUrl}" class="btn btn-secondary" style="display:block; width:100%; text-align:center;">
                        <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.signOut" />
                    </a>
                </div>

                <f:if condition="{workosProfile}">
                    <details class="workos-profile-debug" style="margin-top:1.5rem; border:1px solid #e5e7eb; border-radius:12px; padding:1rem; background:#fafafa;">
                        <summary style="cursor:pointer; font-weight:600;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileData" /></summary>
                        <table style="width:100%; border-collapse:collapse; font-size:0.85rem; margin-top:0.75rem;">
                            <f:if condition="{workosProfile.id}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileId" /></td><td style="padding:0.3rem 0.5rem; word-break:break-all;">{workosProfile.id}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.email}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileEmail" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.email}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.firstName}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileFirstName" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.firstName}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.lastName}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileLastName" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.lastName}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.emailVerified}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileEmailVerified" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.emailVerified}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.lastSignInAt}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileLastSignIn" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.lastSignInAt}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.createdAt}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileCreated" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.createdAt}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.updatedAt}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.profileUpdated" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.updatedAt}</td></tr>
                            </f:if>
                        </table>
                        <f:if condition="{workosProfile.metadata}">
                            <p style="margin:0.75rem 0 0.25rem; font-weight:600; font-size:0.85rem; color:#666;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.customMetadata" /></p>
                            <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                                <f:for each="{workosProfile.metadata}" as="value" key="key">
                                    <tr>
                                        <td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;">{key}</td>
                                        <td style="padding:0.3rem 0.5rem;">{value}</td>
                                    </tr>
                                </f:for>
                            </table>
                        </f:if>
                    </details>
                </f:if>
            </f:if>

            <f:if condition="!{isLoggedIn}">
                <div class="workos-auth-card" style="border:1px solid #e5e7eb; border-radius:12px; padding:1.5rem; background:#fff;">
                    <f:if condition="{authError}">
                        <div class="alert alert-danger" style="font-size:0.9rem; margin-bottom:1rem; padding:0.75rem 1rem; border-radius:8px; background:#fef2f2; border:1px solid #fecaca; color:#991b1b;">{authError}</div>
                    </f:if>

                    <f:form action="passwordAuth" method="post" style="margin-bottom:0;">
                        <f:form.hidden name="returnTo" value="{loginUrl}" />
                        <div style="margin-bottom:0.75rem;">
                            <label for="workos-email" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.email" /></label>
                            <input id="workos-email" type="email" name="email" required autocomplete="email" placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.emailPlaceholder')}"
                                   style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                        </div>
                        <div style="margin-bottom:1rem;">
                            <label for="workos-password" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.password" /></label>
                            <input id="workos-password" type="password" name="password" required autocomplete="current-password" placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.passwordPlaceholder')}"
                                   style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%; padding:0.6rem; border-radius:8px; font-weight:600; font-size:0.95rem; border:none; cursor:pointer;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.signIn" /></button>
                    </f:form>

                    <div style="display:flex; align-items:center; margin:1.25rem 0; gap:0.75rem;">
                        <div style="flex:1; height:1px; background:#e5e7eb;"></div>
                        <span style="font-size:0.8rem; color:#9ca3af; text-transform:uppercase; letter-spacing:0.05em;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.or" /></span>
                        <div style="flex:1; height:1px; background:#e5e7eb;"></div>
                    </div>

                    <f:form action="magicAuthSend" method="post" style="margin-bottom:1rem;">
                        <f:form.hidden name="returnTo" value="{loginUrl}" />
                        <div style="display:flex; gap:0.5rem;">
                            <input type="email" name="email" required placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.emailPlaceholder')}"
                                   style="flex:1; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                            <button type="submit" class="btn btn-outline-primary" style="white-space:nowrap; padding:0.55rem 1rem; border-radius:8px; font-size:0.9rem; cursor:pointer;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.emailCode" /></button>
                        </div>
                    </f:form>

                    <div class="workos-social-row">
                        <f:for each="{socialProviders}" as="provider">
                            <f:render partial="SocialButton" arguments="{provider: provider}" />
                        </f:for>
                    </div>

                    <div style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:#6b7280;">
                        <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.noAccount" />
                        <f:link.action action="signUp" style="color:#4f46e5; font-weight:600; text-decoration:none;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.login.signUp" /></f:link.action>
                    </div>
                </div>
            </f:if>
        </f:then>
        <f:else>
            <div class="alert alert-warning" style="border-radius:12px; padding:1rem;">
                <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.notConfigured" />
            </div>
        </f:else>
    </f:if>
</div>
</html>
