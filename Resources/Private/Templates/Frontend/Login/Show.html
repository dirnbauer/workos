<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:asset.css identifier="workos-auth-plugin-login" href="EXT:workos_auth/Resources/Public/Css/plugin-login.css" />

<div class="workos-auth-plugin" style="max-width:400px;">
    <f:if condition="{configured}">
        <f:then>
            <f:if condition="{isLoggedIn}">
                <div class="workos-auth-card" style="border:1px solid #e5e7eb; border-radius:12px; padding:1.5rem; background:#fff;">
                    <div style="text-align:center; margin-bottom:1rem;">
                        <f:if condition="{avatarUrl}">
                            <img src="{avatarUrl}" alt="" referrerpolicy="no-referrer" loading="lazy" style="width:64px; height:64px; border-radius:50%; margin-bottom:0.75rem; background:#f3f4f6;" />
                        </f:if>
                        <p style="margin:0; font-size:1.05rem;">
                            <f:if condition="{displayName}">
                                <f:then>
                                    <f:translate key="workos_auth.messages:frontend.login.signedInAs" arguments="{name: displayName}" />
                                </f:then>
                                <f:else>
                                    <f:translate key="workos_auth.messages:frontend.login.signedIn" />
                                </f:else>
                            </f:if>
                        </p>
                    </div>
                    <a href="{logoutUrl}" class="btn btn-secondary" style="display:block; width:100%; text-align:center;">
                        <f:translate key="workos_auth.messages:frontend.login.signOut" />
                    </a>
                </div>

                <f:if condition="{workosProfile}">
                    <details class="workos-profile-debug" style="margin-top:1.5rem; border:1px solid #e5e7eb; border-radius:12px; padding:1rem; background:#fafafa;">
                        <summary style="cursor:pointer; font-weight:600;"><f:translate key="workos_auth.messages:frontend.login.profileData" /></summary>
                        <table style="width:100%; border-collapse:collapse; font-size:0.85rem; margin-top:0.75rem;">
                            <f:if condition="{workosProfile.id}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileId" /></td><td style="padding:0.3rem 0.5rem; word-break:break-all;">{workosProfile.id}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.email}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileEmail" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.email}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.firstName}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileFirstName" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.firstName}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.lastName}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileLastName" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.lastName}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.emailVerified}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileEmailVerified" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.emailVerified}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.lastSignInAt}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileLastSignIn" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.lastSignInAt}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.createdAt}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileCreated" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.createdAt}</td></tr>
                            </f:if>
                            <f:if condition="{workosProfile.updatedAt}">
                                <tr><td style="padding:0.3rem 0.5rem; font-weight:600; white-space:nowrap; color:#666;"><f:translate key="workos_auth.messages:frontend.login.profileUpdated" /></td><td style="padding:0.3rem 0.5rem;">{workosProfile.updatedAt}</td></tr>
                            </f:if>
                        </table>
                        <f:if condition="{workosProfile.metadata}">
                            <p class="workos-profile-debug__section-title"><f:translate key="workos_auth.messages:frontend.login.customMetadata" /></p>
                            <table class="workos-profile-debug__metadata-table">
                                <f:for each="{workosProfile.metadata}" as="value" key="key">
                                    <tr>
                                        <td class="workos-profile-debug__metadata-key">{key}</td>
                                        <td class="workos-profile-debug__metadata-value">{value}</td>
                                    </tr>
                                </f:for>
                            </table>
                        </f:if>
                    </details>
                </f:if>
            </f:if>

            <f:if condition="!{isLoggedIn}">
                <div class="workos-auth-card" style="border:1px solid #e5e7eb; border-radius:12px; padding:1.5rem; background:#fff;">
                    <f:if condition="{authError}">
                        <div class="alert alert-danger" style="font-size:0.9rem; margin-bottom:1rem; padding:0.75rem 1rem; border-radius:8px; background:#fef2f2; border:1px solid #fecaca; color:#991b1b;">{authError}</div>
                    </f:if>

                    <f:form action="passwordAuth" method="post" style="margin-bottom:0;" requestToken="{requestToken}">
                        <f:form.hidden name="returnTo" value="{returnToUrl}" />
                        <div style="margin-bottom:0.75rem;">
                            <label for="workos-email" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="workos_auth.messages:common.email" /></label>
                            <input id="workos-email" type="email" name="email" required autocomplete="email" placeholder="{f:translate(key: 'workos_auth.messages:frontend.login.emailPlaceholder')}"
                                   style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                        </div>
                        <div style="margin-bottom:1rem;">
                            <label for="workos-password" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.25rem; color:#374151;"><f:translate key="workos_auth.messages:common.password" /></label>
                            <input id="workos-password" type="password" name="password" required autocomplete="current-password" placeholder="{f:translate(key: 'workos_auth.messages:frontend.login.passwordPlaceholder')}"
                                   style="width:100%; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%; padding:0.6rem; border-radius:8px; font-weight:600; font-size:0.95rem; border:none; cursor:pointer;"><f:translate key="workos_auth.messages:frontend.login.signIn" /></button>
                    </f:form>

                    <div style="display:flex; align-items:center; margin:1.25rem 0; gap:0.75rem;">
                        <div style="flex:1; height:1px; background:#e5e7eb;"></div>
                        <span style="font-size:0.8rem; color:#9ca3af; text-transform:uppercase; letter-spacing:0.05em;"><f:translate key="workos_auth.messages:common.or" /></span>
                        <div style="flex:1; height:1px; background:#e5e7eb;"></div>
                    </div>

                    <f:form action="magicAuthSend" method="post" style="margin-bottom:1rem;" requestToken="{requestToken}">
                        <f:form.hidden name="returnTo" value="{returnToUrl}" />
                        <div style="display:flex; gap:0.5rem;">
                            <input type="email" name="email" required placeholder="{f:translate(key: 'workos_auth.messages:frontend.login.emailPlaceholder')}"
                                   style="flex:1; padding:0.55rem 0.75rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; box-sizing:border-box;" />
                            <button type="submit" class="btn btn-outline-primary" style="white-space:nowrap; padding:0.55rem 1rem; border-radius:8px; font-size:0.9rem; cursor:pointer;"><f:translate key="workos_auth.messages:frontend.login.emailCode" /></button>
                        </div>
                    </f:form>

                    <div class="workos-social-row">
                        <f:for each="{socialProviders}" as="provider">
                            <f:render partial="SocialButton" arguments="{provider: provider}" />
                        </f:for>
                    </div>

                    <div style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:#6b7280;">
                        <f:translate key="workos_auth.messages:frontend.login.noAccount" />
                        <f:link.action action="signUp" arguments="{returnTo: returnToUrl}" style="color:#4f46e5; font-weight:600; text-decoration:none;"><f:translate key="workos_auth.messages:frontend.login.signUp" /></f:link.action>
                    </div>
                </div>
            </f:if>
        </f:then>
        <f:else>
            <div class="alert alert-warning" style="border-radius:12px; padding:1rem;">
                <f:translate key="workos_auth.messages:common.notConfigured" />
            </div>
        </f:else>
    </f:if>
</div>
</html>
