<f:layout name="Login" />

<f:section name="loginFormFields">
    <style>
    .workos-social-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .workos-social-btn {
        flex: 1 1 calc(50% - 0.25rem);
        min-width: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: var(--typo3-btn-padding-y, 0.55rem) var(--typo3-btn-padding-x, 0.75rem);
        border: var(--typo3-btn-border-width, 1px) solid var(--typo3-btn-border-color, #d1d5db);
        border-radius: var(--typo3-btn-border-radius, 6px);
        font-size: var(--typo3-btn-font-size, 0.9rem);
        font-weight: 500;
        color: var(--typo3-btn-color, #1f2937);
        background: var(--typo3-btn-bg, #fff);
        text-decoration: none;
        transition: var(--typo3-btn-transition, background 0.15s, border-color 0.15s);
    }
    .workos-social-btn:hover, .workos-social-btn:focus {
        background: var(--typo3-btn-hover-bg, #f9fafb);
        border-color: var(--typo3-btn-hover-border-color, #9ca3af);
        color: var(--typo3-btn-hover-color, #111827);
        text-decoration: none;
    }
    .workos-social-btn__icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .workos-social-btn__icon svg { display: block; }
    .workos-divider { display: flex; align-items: center; margin: 0.75rem 0; gap: 0.75rem; }
    .workos-divider__line { flex: 1; height: 1px; background: var(--typo3-border-mix, #e5e7eb); }
    .workos-divider__text {
        font-size: 0.8rem;
        color: var(--typo3-text-color-base, #6b7280);
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    @media (max-width: 480px) {
        .workos-social-btn { flex: 1 1 0; padding: 0.55rem; }
        .workos-social-btn__label { display: none; }
    }
    </style>
    <div class="form-group">
        <f:if condition="{enabled}">
            <f:then>
                <f:if condition="{configured}">
                    <f:then>
                        <f:if condition="{authError}">
                            <div class="alert alert-danger" style="margin-bottom:1rem;">{authError}</div>
                        </f:if>

                        <f:if condition="{magicAuthState}">
                            <f:then>
                                <div style="text-align:center; margin-bottom:1rem;">
                                    <p style="font-size:1rem; font-weight:600; margin:0 0 0.25rem;"><f:translate key="workos_auth.messages:frontend.magicauth.checkEmail" /></p>
                                    <p style="font-size:0.85rem; color:#6b7280; margin:0;">
                                        <f:translate key="workos_auth.messages:frontend.magicauth.codeSent" arguments="{email: magicAuthEmail}" />
                                    </p>
                                </div>
                                <div style="margin-bottom:0.75rem;">
                                    <input type="text" name="code" required autofocus autocomplete="one-time-code"
                                           inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000"
                                           class="form-control"
                                           style="text-align:center; letter-spacing:0.5em; font-size:1.5rem; font-family:monospace;" />
                                </div>
                                <input type="hidden" name="userId" value="{magicAuthUserId}" />
                                <button type="submit" formaction="{magicAuthVerifyUrl}" formmethod="post"
                                        class="btn btn-login btn-block t3js-login-submit">
                                    <f:translate key="workos_auth.messages:frontend.magicauth.verifyCode" />
                                </button>
                                <div style="text-align:center; margin-top:0.75rem;">
                                    <a href="{f:be.uri(route: 'login')}" style="font-size:0.85rem;"><f:translate key="workos_auth.messages:frontend.magicauth.backToSignIn" /></a>
                                </div>
                            </f:then>
                            <f:else>
                                <a href="{loginUrl}" class="btn btn-login btn-block" style="display:block; text-align:center; margin-bottom:0.75rem;">
                                    <f:translate key="workos_auth.messages:loginprovider.label" />
                                </a>

                                <div class="workos-social-row">
                                    <f:for each="{socialProviders}" as="provider">
                                        <f:render partial="SocialButton" arguments="{provider: provider}" />
                                    </f:for>
                                </div>

                                <div class="workos-divider">
                                    <div class="workos-divider__line"></div>
                                    <span class="workos-divider__text"><f:translate key="workos_auth.messages:common.or" /></span>
                                    <div class="workos-divider__line"></div>
                                </div>

                                <div style="margin-bottom:0.75rem;">
                                    <input type="email" name="email" autocomplete="email"
                                           placeholder="{f:translate(key: 'workos_auth.messages:backend.login.emailPlaceholder')}"
                                           class="form-control" />
                                </div>
                                <button type="submit" formaction="{magicAuthSendUrl}" formmethod="post"
                                        class="btn btn-default btn-block" style="width:100%;">
                                    <f:translate key="workos_auth.messages:backend.login.emailLoginCode" />
                                </button>
                            </f:else>
                        </f:if>
                    </f:then>
                    <f:else>
                        <div class="alert alert-warning">
                            <f:translate key="workos_auth.messages:backend.login.notConfigured" />
                            <a href="{setupUrl}"><f:translate key="workos_auth.messages:backend.login.openSetup" /></a>.
                        </div>
                    </f:else>
                </f:if>
            </f:then>
            <f:else>
                <div class="alert alert-info">
                    <f:translate key="workos_auth.messages:backend.login.disabled" />
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>
