<f:layout name="Login" />

<f:section name="loginFormFields">
    <style>
    /* When the WorkOS provider is active, hide TYPO3's default submit button;
       our own "Sign in" button below handles WorkOS authentication. */
    #t3-login-submit-section { display: none !important; }

    .workos-field { margin-bottom: 0.75rem; }
    .workos-field label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 0.25rem;
        color: var(--typo3-text-color-base, #1f2937);
    }
    .workos-primary-btn {
        display: block;
        width: 100%;
        margin-bottom: 1rem;
    }
    .workos-hint {
        text-align: center;
        margin: 0.25rem 0 0.5rem;
        font-size: 0.8rem;
        color: var(--typo3-text-color-base, #6b7280);
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .workos-social-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .workos-social-btn {
        flex: 1 1 calc(50% - 0.25rem);
        min-width: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: var(--typo3-btn-padding-y, 0.55rem) var(--typo3-btn-padding-x, 0.75rem);
        border: var(--typo3-btn-border-width, 1px) solid var(--typo3-btn-border-color, #d1d5db);
        border-radius: var(--typo3-btn-border-radius, 6px);
        font-size: var(--typo3-btn-font-size, 0.9rem);
        font-weight: 500;
        color: var(--typo3-btn-color, #1f2937);
        background: var(--typo3-btn-bg, #fff);
        text-decoration: none;
        transition: var(--typo3-btn-transition, background 0.15s, border-color 0.15s);
    }
    .workos-social-btn:hover, .workos-social-btn:focus {
        background: var(--typo3-btn-hover-bg, #f9fafb);
        border-color: var(--typo3-btn-hover-border-color, #9ca3af);
        color: var(--typo3-btn-hover-color, #111827);
        text-decoration: none;
    }
    .workos-social-btn__icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .workos-social-btn__icon svg { display: block; }
    .workos-authkit-link {
        margin-top: 0.75rem;
        text-align: center;
        font-size: 0.85rem;
    }
    @media (max-width: 480px) {
        .workos-social-btn { flex: 1 1 0; padding: 0.55rem; }
        .workos-social-btn__label { display: none; }
    }
    </style>

    <div class="form-group">
        <f:if condition="{enabled}">
            <f:then>
                <f:if condition="{configured}">
                    <f:then>
                        <f:if condition="{authError}">
                            <div class="alert alert-danger" style="margin-bottom:1rem;">{authError}</div>
                        </f:if>

                        <div class="workos-field">
                            <label for="workos-email"><f:translate key="workos_auth.messages:backend.login.email" /></label>
                            <input type="email"
                                   id="workos-email"
                                   autocomplete="email"
                                   spellcheck="false"
                                   autocapitalize="off"
                                   class="form-control"
                                   data-workos-field="email" />
                        </div>
                        <div class="workos-field">
                            <label for="workos-password"><f:translate key="workos_auth.messages:backend.login.password" /></label>
                            <input type="password"
                                   id="workos-password"
                                   autocomplete="current-password"
                                   class="form-control"
                                   data-workos-field="password" />
                        </div>

                        <button type="button"
                                id="workos-password-submit"
                                class="btn btn-login workos-primary-btn"
                                data-workos-password-url="{passwordAuthUrl}">
                            <f:translate key="workos_auth.messages:backend.login.signIn" />
                        </button>

                        <div class="workos-hint"><f:translate key="workos_auth.messages:backend.login.socialHint" /></div>
                        <div class="workos-social-row">
                            <f:for each="{socialProviders}" as="provider">
                                <f:render partial="SocialButton" arguments="{provider: provider}" />
                            </f:for>
                        </div>

                        <div class="workos-authkit-link">
                            <a href="{loginUrl}"><f:translate key="workos_auth.messages:backend.login.moreOptions" /></a>
                        </div>
                    </f:then>
                    <f:else>
                        <div class="alert alert-warning">
                            <f:translate key="workos_auth.messages:backend.login.notConfigured" />
                            <a href="{setupUrl}"><f:translate key="workos_auth.messages:backend.login.openSetup" /></a>.
                        </div>
                    </f:else>
                </f:if>
            </f:then>
            <f:else>
                <div class="alert alert-info">
                    <f:translate key="workos_auth.messages:backend.login.disabled" />
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>
