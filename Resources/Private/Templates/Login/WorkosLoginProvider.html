<f:layout name="Login" />

<f:section name="loginFormFields">
    <style>
    /* When the WorkOS provider is active, hide TYPO3's default submit button;
       our own "Sign in" button below handles WorkOS authentication. */
    #t3-login-submit-section { display: none !important; }

    .workos-login-root { display: block; }
    .workos-login-form { margin: 0; }
    .workos-field { margin-bottom: 0.75rem; }
    .workos-field label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 0.25rem;
        color: var(--typo3-text-color-base, #1f2937);
    }
    .workos-primary-btn {
        display: block;
        width: 100%;
        margin-bottom: 1rem;
    }
    .workos-hint {
        text-align: center;
        margin: 0.25rem 0 0.5rem;
        font-size: 0.8rem;
        color: var(--typo3-text-color-base, #6b7280);
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .workos-social-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .workos-social-btn {
        flex: 1 1 calc(50% - 0.25rem);
        min-width: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: var(--typo3-btn-padding-y, 0.55rem) var(--typo3-btn-padding-x, 0.75rem);
        border: var(--typo3-btn-border-width, 1px) solid var(--typo3-btn-border-color, #d1d5db);
        border-radius: var(--typo3-btn-border-radius, 6px);
        font-size: var(--typo3-btn-font-size, 0.9rem);
        font-weight: 500;
        color: var(--typo3-btn-color, #1f2937);
        background: var(--typo3-btn-bg, #fff);
        text-decoration: none;
        transition: var(--typo3-btn-transition, background 0.15s, border-color 0.15s);
    }
    .workos-social-btn:hover, .workos-social-btn:focus {
        background: var(--typo3-btn-hover-bg, #f9fafb);
        border-color: var(--typo3-btn-hover-border-color, #9ca3af);
        color: var(--typo3-btn-hover-color, #111827);
        text-decoration: none;
    }
    .workos-social-btn__icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .workos-social-btn__icon svg { display: block; }
    .workos-authkit-link {
        margin-top: 0.75rem;
        text-align: center;
        font-size: 0.85rem;
    }
    button.workos-secondary-btn {
        display: block;
        width: 100%;
        margin-bottom: 1rem;
        padding: var(--typo3-btn-padding-y, 0.55rem) var(--typo3-btn-padding-x, 0.75rem);
        font-size: var(--typo3-btn-font-size, 0.95rem);
        font-weight: 500;
        line-height: 1.5;
        background: transparent !important;
        color: var(--typo3-text-color-base, #1f2937) !important;
        border: 1px solid #cbd5e1 !important;
        border-radius: var(--typo3-btn-border-radius, 6px);
        cursor: pointer;
    }
    button.workos-secondary-btn:hover, button.workos-secondary-btn:focus {
        background: var(--typo3-btn-hover-bg, #f9fafb) !important;
        border-color: var(--typo3-btn-hover-border-color, #9ca3af) !important;
        color: var(--typo3-btn-hover-color, #111827) !important;
    }
    .workos-divider {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.75rem 0;
        font-size: 0.8rem;
        color: var(--typo3-text-color-base, #6b7280);
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .workos-divider::before, .workos-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--typo3-btn-border-color, #e5e7eb);
        opacity: 0.6;
    }
    .workos-magic-note {
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
        color: var(--typo3-text-color-base, #374151);
    }
    .workos-magic-note strong { font-weight: 600; }
    @media (max-width: 480px) {
        .workos-social-btn { flex: 1 1 0; padding: 0.55rem; }
        .workos-social-btn__label { display: none; }
    }
    </style>

    <div class="workos-login-root"
         data-workos-password-url="{passwordAuthUrl}"
         data-workos-magic-send-url="{magicSendUrl}"
         data-workos-magic-verify-url="{magicVerifyUrl}"
         data-workos-email-verify-url="{emailVerifyUrl}">
        <f:if condition="{enabled}">
            <f:then>
                <f:if condition="{configured}">
                    <f:then>
                        <f:if condition="{authError}">
                            <div class="alert alert-danger" style="margin-bottom:1rem;">{authError}</div>
                        </f:if>
                        <f:if condition="{authNotice}">
                            <div class="alert alert-success" style="margin-bottom:1rem;">{authNotice}</div>
                        </f:if>

                        <f:if condition="{emailVerificationState}">
                            <f:then>
                                <div class="workos-magic-note">
                                    <f:translate key="workos_auth.messages:backend.login.verifyEmail.subtitle"
                                                 arguments="{0: emailVerificationEmail}" />
                                </div>
                                <div class="workos-field">
                                    <label for="workos-email-code"><f:translate key="workos_auth.messages:backend.login.verifyEmail.codeLabel" /></label>
                                    <input type="text"
                                           id="workos-email-code"
                                           name="code"
                                           inputmode="numeric"
                                           autocomplete="one-time-code"
                                           pattern="[0-9]*"
                                           spellcheck="false"
                                           class="form-control"
                                           required="required" />
                                </div>
                                <input type="hidden" id="workos-email-pending-token" name="pendingToken" value="{emailVerificationPendingToken}" />
                                <input type="hidden" id="workos-email-verify-email" name="email" value="{emailVerificationEmail}" />
                                <input type="hidden" id="workos-email-verify-userid" name="userId" value="{emailVerificationUserId}" />
                                <button type="button"
                                        id="workos-email-verify-submit"
                                        class="btn btn-login workos-primary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.verifyEmail.submit" />
                                </button>
                                <f:if condition="{emailVerificationUserId}">
                                    <form action="{emailVerifyResendUrl}" method="post" style="margin:0 0 0.5rem;">
                                        <input type="hidden" name="pendingToken" value="{emailVerificationPendingToken}" />
                                        <input type="hidden" name="email" value="{emailVerificationEmail}" />
                                        <input type="hidden" name="userId" value="{emailVerificationUserId}" />
                                        <button type="submit" class="btn workos-secondary-btn">
                                            <f:translate key="workos_auth.messages:backend.login.verifyEmail.resend" />
                                        </button>
                                    </form>
                                </f:if>
                                <div class="workos-authkit-link">
                                    <a href="{loginUrl}?loginProvider=1744276800"><f:translate key="workos_auth.messages:backend.login.magic.back" /></a>
                                </div>
                            </f:then>
                            <f:else>
                        <f:if condition="{magicAuthState}">
                            <f:then>
                                <div class="workos-magic-note">
                                    <f:translate key="workos_auth.messages:backend.login.magic.codeSent"
                                                 arguments="{0: magicAuthEmail}" />
                                </div>
                                <div class="workos-field">
                                    <label for="workos-magic-code"><f:translate key="workos_auth.messages:backend.login.magic.codeLabel" /></label>
                                    <input type="text"
                                           id="workos-magic-code"
                                           name="code"
                                           inputmode="numeric"
                                           autocomplete="one-time-code"
                                           pattern="[0-9]*"
                                           spellcheck="false"
                                           class="form-control"
                                           required="required" />
                                </div>
                                <input type="hidden" id="workos-magic-userid" name="userId" value="{magicAuthUserId}" />
                                <button type="button"
                                        id="workos-magic-verify-submit"
                                        class="btn btn-login workos-primary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.magic.verify" />
                                </button>
                                <div class="workos-authkit-link">
                                    <a href="{loginUrl}?loginProvider=1744276800"><f:translate key="workos_auth.messages:backend.login.magic.back" /></a>
                                </div>
                            </f:then>
                            <f:else>
                                <div class="workos-field">
                                    <label for="workos-email"><f:translate key="workos_auth.messages:backend.login.email" /></label>
                                    <input type="email"
                                           id="workos-email"
                                           autocomplete="email"
                                           spellcheck="false"
                                           autocapitalize="off"
                                           class="form-control"
                                           required="required" />
                                </div>
                                <div class="workos-field">
                                    <label for="workos-password"><f:translate key="workos_auth.messages:backend.login.password" /></label>
                                    <input type="password"
                                           id="workos-password"
                                           autocomplete="current-password"
                                           class="form-control" />
                                </div>

                                <button type="button"
                                        id="workos-password-submit"
                                        class="btn btn-login workos-primary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.signIn" />
                                </button>

                                <div class="workos-divider"><f:translate key="workos_auth.messages:common.or" /></div>

                                <button type="button"
                                        id="workos-magic-send-submit"
                                        class="btn workos-secondary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.magic.send" />
                                </button>

                                <div class="workos-hint"><f:translate key="workos_auth.messages:backend.login.socialHint" /></div>
                                <div class="workos-social-row">
                                    <f:for each="{socialProviders}" as="provider">
                                        <f:render partial="SocialButton" arguments="{provider: provider}" />
                                    </f:for>
                                </div>

                                <div class="workos-authkit-link">
                                    <a href="{loginUrl}"><f:translate key="workos_auth.messages:backend.login.moreOptions" /></a>
                                </div>
                            </f:else>
                        </f:if>
                            </f:else>
                        </f:if>
                    </f:then>
                    <f:else>
                        <div class="alert alert-warning">
                            <f:translate key="workos_auth.messages:backend.login.notConfigured" />
                            <a href="{setupUrl}"><f:translate key="workos_auth.messages:backend.login.openSetup" /></a>.
                        </div>
                    </f:else>
                </f:if>
            </f:then>
            <f:else>
                <div class="alert alert-info">
                    <f:translate key="workos_auth.messages:backend.login.disabled" />
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>
