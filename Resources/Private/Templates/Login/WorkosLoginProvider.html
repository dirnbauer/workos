<f:layout name="Login" />

<f:section name="loginFormFields">
    <style>
    /* When the WorkOS provider is active, hide TYPO3's default submit button;
       our own "Sign in" button below handles WorkOS authentication. */
    #t3-login-submit-section { display: none !important; }

    .workos-login-root { display: block; }
    .workos-login-form { margin: 0; }
    .workos-field { margin-bottom: 0.75rem; }
    .workos-field label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 0.25rem;
        color: var(--typo3-text-color-base, #1f2937);
    }
    .workos-primary-btn {
        display: block;
        width: 100%;
        margin-bottom: 1rem;
    }
    .workos-hint {
        text-align: center;
        margin: 0.25rem 0 0.5rem;
        font-size: 0.8rem;
        color: var(--typo3-text-color-base, #6b7280);
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .workos-social-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .workos-social-btn {
        flex: 1 1 calc(50% - 0.25rem);
        min-width: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: var(--typo3-btn-padding-y, 0.55rem) var(--typo3-btn-padding-x, 0.75rem);
        border: var(--typo3-btn-border-width, 1px) solid var(--typo3-btn-border-color, #d1d5db);
        border-radius: var(--typo3-btn-border-radius, 6px);
        font-size: var(--typo3-btn-font-size, 0.9rem);
        font-weight: 500;
        color: var(--typo3-btn-color, #1f2937);
        background: var(--typo3-btn-bg, #fff);
        text-decoration: none;
        transition: var(--typo3-btn-transition, background 0.15s, border-color 0.15s);
    }
    .workos-social-btn:hover, .workos-social-btn:focus {
        background: var(--typo3-btn-hover-bg, #f9fafb);
        border-color: var(--typo3-btn-hover-border-color, #9ca3af);
        color: var(--typo3-btn-hover-color, #111827);
        text-decoration: none;
    }
    .workos-social-btn__icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .workos-social-btn__icon svg { display: block; }
    .workos-authkit-link {
        margin-top: 0.75rem;
        text-align: center;
        font-size: 0.85rem;
    }
    button.workos-secondary-btn {
        display: block;
        width: 100%;
        margin-bottom: 1rem;
        padding: var(--typo3-btn-padding-y, 0.55rem) var(--typo3-btn-padding-x, 0.75rem);
        font-size: var(--typo3-btn-font-size, 0.95rem);
        font-weight: 500;
        line-height: 1.5;
        background: transparent !important;
        color: currentColor !important;
        border: 1px solid color-mix(in srgb, currentColor 35%, transparent) !important;
        border-radius: var(--typo3-btn-border-radius, 6px);
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    button.workos-secondary-btn:hover, button.workos-secondary-btn:focus {
        background: color-mix(in srgb, currentColor 10%, transparent) !important;
        border-color: color-mix(in srgb, currentColor 55%, transparent) !important;
        color: currentColor !important;
    }
    .workos-divider {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.75rem 0;
        font-size: 0.8rem;
        color: var(--typo3-text-color-base, #6b7280);
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .workos-divider::before, .workos-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--typo3-btn-border-color, #e5e7eb);
        opacity: 0.6;
    }
    .workos-magic-note {
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
        color: var(--typo3-text-color-base, #374151);
    }
    .workos-magic-note strong { font-weight: 600; }
    .workos-alert {
        display: flex;
        gap: 0.65rem;
        align-items: flex-start;
        padding: 0.75rem 0.85rem;
        border-radius: 8px;
        border: 1px solid transparent;
        margin-bottom: 1rem;
        font-size: 0.85rem;
        line-height: 1.45;
        text-align: left;
    }
    .workos-alert--danger {
        background: color-mix(in srgb, var(--typo3-state-danger-bg, #fef2f2) 85%, transparent);
        border-color: var(--typo3-state-danger-border-color, rgba(220, 38, 38, 0.25));
        color: var(--typo3-state-danger-color, #991b1b);
    }
    .workos-alert--success {
        background: color-mix(in srgb, var(--typo3-state-success-bg, #ecfdf5) 85%, transparent);
        border-color: var(--typo3-state-success-border-color, rgba(5, 150, 105, 0.25));
        color: var(--typo3-state-success-color, #065f46);
    }
    .workos-alert__icon {
        flex: 0 0 auto;
        width: 1.25rem;
        height: 1.25rem;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: currentColor;
        color: var(--typo3-state-danger-bg, #fef2f2);
        font-weight: 700;
        font-size: 0.8rem;
        line-height: 1;
    }
    .workos-alert--success .workos-alert__icon {
        color: var(--typo3-state-success-bg, #ecfdf5);
    }
    .workos-alert__body { flex: 1 1 auto; min-width: 0; }
    .workos-alert__title {
        font-weight: 600;
        font-size: 0.9rem;
        margin: 0 0 0.15rem;
        color: inherit;
    }
    .workos-alert__summary { margin: 0 0 0.35rem; word-break: break-word; }
    .workos-alert__meta {
        margin: 0 0 0.35rem;
        font-size: 0.78rem;
        opacity: 0.9;
        font-family: var(--typo3-font-family-monospace, ui-monospace, SFMono-Regular, Menlo, monospace);
        word-break: break-all;
    }
    .workos-alert__meta-label { opacity: 0.7; margin-right: 0.25rem; }
    .workos-alert__hint {
        margin: 0.35rem 0 0;
        font-size: 0.82rem;
        opacity: 0.95;
    }
    .workos-alert__action {
        display: inline-block;
        margin-top: 0.5rem;
        font-size: 0.82rem;
        font-weight: 500;
        color: inherit;
        text-decoration: underline;
    }
    .workos-alert__action:hover, .workos-alert__action:focus {
        text-decoration: none;
        color: inherit;
    }
    @media (max-width: 480px) {
        .workos-social-btn { flex: 1 1 0; padding: 0.55rem; }
        .workos-social-btn__label { display: none; }
    }
    </style>

    <div class="workos-login-root"
         data-workos-password-url="{passwordAuthUrl}"
         data-workos-magic-send-url="{magicSendUrl}"
         data-workos-magic-verify-url="{magicVerifyUrl}"
         data-workos-email-verify-url="{emailVerifyUrl}">
        <h2 class="workos-login-heading">
            <f:format.raw><f:translate key="workos_auth.messages:backend.login.heading.workos" /></f:format.raw>
        </h2>
        <f:if condition="{enabled}">
            <f:then>
                <f:if condition="{configured}">
                    <f:then>
                        <f:if condition="{authError}">
                            <div class="workos-alert workos-alert--danger" role="alert">
                                <span class="workos-alert__icon" aria-hidden="true">!</span>
                                <div class="workos-alert__body">
                                    <f:if condition="{authErrorDetails}">
                                        <f:then>
                                            <p class="workos-alert__title">{authErrorDetails.title}</p>
                                            <p class="workos-alert__summary">{authErrorDetails.summary}</p>
                                            <f:if condition="{authErrorDetails.email}">
                                                <p class="workos-alert__meta">
                                                    <span class="workos-alert__meta-label"><f:translate key="workos_auth.messages:backend.login.error.emailLabel" default="E-Mail" />:</span>{authErrorDetails.email}
                                                </p>
                                            </f:if>
                                            <f:if condition="{authErrorDetails.userId}">
                                                <p class="workos-alert__meta">
                                                    <span class="workos-alert__meta-label"><f:translate key="workos_auth.messages:backend.login.error.userIdLabel" default="WorkOS ID" />:</span>{authErrorDetails.userId}
                                                </p>
                                            </f:if>
                                            <f:if condition="{authErrorDetails.hint}">
                                                <p class="workos-alert__hint">{authErrorDetails.hint}</p>
                                            </f:if>
                                            <f:if condition="{authErrorDetails.actionUrl}">
                                                <a class="workos-alert__action" href="{authErrorDetails.actionUrl}">{authErrorDetails.actionLabel}</a>
                                            </f:if>
                                        </f:then>
                                        <f:else>
                                            <p class="workos-alert__summary">{authError}</p>
                                        </f:else>
                                    </f:if>
                                </div>
                            </div>
                        </f:if>
                        <f:if condition="{authNotice}">
                            <div class="workos-alert workos-alert--success" role="status">
                                <span class="workos-alert__icon" aria-hidden="true">&#10003;</span>
                                <div class="workos-alert__body">
                                    <p class="workos-alert__summary">{authNotice}</p>
                                </div>
                            </div>
                        </f:if>

                        <f:if condition="{emailVerificationState}">
                            <f:then>
                                <div class="workos-magic-note">
                                    <f:translate key="workos_auth.messages:backend.login.verifyEmail.subtitle"
                                                 arguments="{0: emailVerificationEmail}" />
                                </div>
                                <div class="workos-field">
                                    <label for="workos-email-code"><f:translate key="workos_auth.messages:backend.login.verifyEmail.codeLabel" /></label>
                                    <input type="text"
                                           id="workos-email-code"
                                           name="code"
                                           inputmode="numeric"
                                           autocomplete="one-time-code"
                                           pattern="[0-9]*"
                                           spellcheck="false"
                                           class="form-control"
                                           required="required" />
                                </div>
                                <input type="hidden" id="workos-email-pending-token" name="pendingToken" value="{emailVerificationPendingToken}" />
                                <input type="hidden" id="workos-email-verify-email" name="email" value="{emailVerificationEmail}" />
                                <input type="hidden" id="workos-email-verify-userid" name="userId" value="{emailVerificationUserId}" />
                                <button type="button"
                                        id="workos-email-verify-submit"
                                        class="btn btn-login workos-primary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.verifyEmail.submit" />
                                </button>
                                <f:if condition="{emailVerificationUserId}">
                                    <form action="{emailVerifyResendUrl}" method="post" style="margin:0 0 0.5rem;">
                                        <input type="hidden" name="pendingToken" value="{emailVerificationPendingToken}" />
                                        <input type="hidden" name="email" value="{emailVerificationEmail}" />
                                        <input type="hidden" name="userId" value="{emailVerificationUserId}" />
                                        <button type="submit" class="btn workos-secondary-btn">
                                            <f:translate key="workos_auth.messages:backend.login.verifyEmail.resend" />
                                        </button>
                                    </form>
                                </f:if>
                                <div class="workos-authkit-link">
                                    <a href="{loginUrl}?loginProvider=1744276800"><f:translate key="workos_auth.messages:backend.login.magic.back" /></a>
                                </div>
                            </f:then>
                            <f:else>
                        <f:if condition="{magicAuthState}">
                            <f:then>
                                <div class="workos-magic-note">
                                    <f:translate key="workos_auth.messages:backend.login.magic.codeSent"
                                                 arguments="{0: magicAuthEmail}" />
                                </div>
                                <div class="workos-field">
                                    <label for="workos-magic-code"><f:translate key="workos_auth.messages:backend.login.magic.codeLabel" /></label>
                                    <input type="text"
                                           id="workos-magic-code"
                                           name="code"
                                           inputmode="numeric"
                                           autocomplete="one-time-code"
                                           pattern="[0-9]*"
                                           spellcheck="false"
                                           class="form-control"
                                           required="required" />
                                </div>
                                <input type="hidden" id="workos-magic-userid" name="userId" value="{magicAuthUserId}" />
                                <button type="button"
                                        id="workos-magic-verify-submit"
                                        class="btn btn-login workos-primary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.magic.verify" />
                                </button>
                                <div class="workos-authkit-link">
                                    <a href="{loginUrl}?loginProvider=1744276800"><f:translate key="workos_auth.messages:backend.login.magic.back" /></a>
                                </div>
                            </f:then>
                            <f:else>
                                <div class="workos-field">
                                    <label for="workos-email"><f:translate key="workos_auth.messages:backend.login.email" /></label>
                                    <input type="email"
                                           id="workos-email"
                                           autocomplete="email"
                                           spellcheck="false"
                                           autocapitalize="off"
                                           class="form-control"
                                           required="required" />
                                </div>
                                <div class="workos-field">
                                    <label for="workos-password"><f:translate key="workos_auth.messages:backend.login.password" /></label>
                                    <input type="password"
                                           id="workos-password"
                                           autocomplete="current-password"
                                           class="form-control" />
                                </div>

                                <button type="button"
                                        id="workos-password-submit"
                                        class="btn btn-login workos-primary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.signIn" />
                                </button>

                                <div class="workos-divider"><f:translate key="workos_auth.messages:common.or" /></div>

                                <div class="workos-field">
                                    <label for="workos-magic-email"><f:translate key="workos_auth.messages:backend.login.magic.emailLabel" /></label>
                                    <input type="email"
                                           id="workos-magic-email"
                                           name="magic_email"
                                           autocomplete="email"
                                           spellcheck="false"
                                           autocapitalize="off"
                                           class="form-control" />
                                </div>
                                <button type="button"
                                        id="workos-magic-send-submit"
                                        class="btn workos-secondary-btn">
                                    <f:translate key="workos_auth.messages:backend.login.magic.send" />
                                </button>

                                <div class="workos-hint"><f:translate key="workos_auth.messages:backend.login.socialHint" /></div>
                                <div class="workos-social-row">
                                    <f:for each="{socialProviders}" as="provider">
                                        <f:render partial="SocialButton" arguments="{provider: provider}" />
                                    </f:for>
                                </div>

                                <div class="workos-authkit-link" data-workos-relocate>
                                    <a href="{loginUrl}"><f:translate key="workos_auth.messages:backend.login.moreOptions" /></a>
                                </div>
                            </f:else>
                        </f:if>
                            </f:else>
                        </f:if>
                    </f:then>
                    <f:else>
                        <div class="alert alert-warning">
                            <f:translate key="workos_auth.messages:backend.login.notConfigured" />
                            <a href="{setupUrl}"><f:translate key="workos_auth.messages:backend.login.openSetup" /></a>.
                        </div>
                    </f:else>
                </f:if>
            </f:then>
            <f:else>
                <div class="alert alert-info">
                    <f:translate key="workos_auth.messages:backend.login.disabled" />
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>
