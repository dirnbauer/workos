<f:layout name="Login" />

<f:section name="loginFormFields">
    <style>
    .workos-social-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .workos-social-btn {
        flex: 1 1 calc(50% - 0.25rem);
        min-width: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.55rem 0.75rem;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        color: #fff;
        background: rgba(255,255,255,0.08);
        text-decoration: none;
        transition: background 0.15s, border-color 0.15s;
    }
    .workos-social-btn:hover, .workos-social-btn:focus {
        background: rgba(255,255,255,0.15);
        border-color: rgba(255,255,255,0.4);
        text-decoration: none;
        color: #fff;
    }
    .workos-social-btn__icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; background: #fff; border-radius: 3px; padding: 2px; }
    .workos-social-btn__icon svg { display: block; }
    @media (max-width: 480px) {
        .workos-social-btn { flex: 1 1 0; padding: 0.55rem; }
        .workos-social-btn__label { display: none; }
    }
    </style>
    <div class="form-group">
        <f:if condition="{enabled}">
            <f:then>
                <f:if condition="{configured}">
                    <f:then>
                        <f:if condition="{authError}">
                            <div class="alert alert-danger" style="margin-bottom:1rem;">{authError}</div>
                        </f:if>

                        <f:if condition="{magicAuthState}">
                            <f:then>
                                <div style="text-align:center; margin-bottom:1rem;">
                                    <p style="font-size:1rem; font-weight:600; margin:0 0 0.25rem;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.magicauth.checkEmail" /></p>
                                    <p style="font-size:0.85rem; color:#6b7280; margin:0;">
                                        <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.magicauth.codeSent" /> <strong>{magicAuthEmail}</strong>
                                    </p>
                                </div>
                                <div style="margin-bottom:0.75rem;">
                                    <input type="text" name="code" required autofocus autocomplete="one-time-code"
                                           inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000"
                                           class="form-control"
                                           style="text-align:center; letter-spacing:0.5em; font-size:1.5rem; font-family:monospace;" />
                                </div>
                                <input type="hidden" name="userId" value="{magicAuthUserId}" />
                                <button type="submit" formaction="{magicAuthVerifyUrl}" formmethod="post"
                                        class="btn btn-login btn-block t3js-login-submit">
                                    <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.magicauth.verifyCode" />
                                </button>
                                <div style="text-align:center; margin-top:0.75rem;">
                                    <a href="{f:be.uri(route: 'login')}" style="font-size:0.85rem;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:frontend.magicauth.backToSignIn" /></a>
                                </div>
                            </f:then>
                            <f:else>
                                <a href="{loginUrl}" class="btn btn-login btn-block" style="display:block; text-align:center; margin-bottom:0.75rem;">
                                    <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:loginprovider.label" />
                                </a>

                                <div class="workos-social-row">
                                    <f:for each="{socialProviders}" as="provider">
                                        <f:render partial="SocialButton" arguments="{provider: provider}" />
                                    </f:for>
                                </div>

                                <div style="display:flex; align-items:center; margin:0.75rem 0; gap:0.75rem;">
                                    <div style="flex:1; height:1px; background:rgba(255,255,255,0.2);"></div>
                                    <span style="font-size:0.8rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.05em;"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:common.or" /></span>
                                    <div style="flex:1; height:1px; background:rgba(255,255,255,0.2);"></div>
                                </div>

                                <div style="margin-bottom:0.75rem;">
                                    <input type="email" name="email" autocomplete="email"
                                           placeholder="{f:translate(key: 'LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:backend.login.emailPlaceholder')}"
                                           class="form-control" />
                                </div>
                                <button type="submit" formaction="{magicAuthSendUrl}" formmethod="post"
                                        class="btn btn-default btn-block" style="width:100%;">
                                    <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:backend.login.emailLoginCode" />
                                </button>
                            </f:else>
                        </f:if>
                    </f:then>
                    <f:else>
                        <div class="alert alert-warning">
                            <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:backend.login.notConfigured" />
                            <a href="{setupUrl}"><f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:backend.login.openSetup" /></a>.
                        </div>
                    </f:else>
                </f:if>
            </f:then>
            <f:else>
                <div class="alert alert-info">
                    <f:translate key="LLL:EXT:workos_auth/Resources/Private/Language/locallang.xlf:backend.login.disabled" />
                </div>
            </f:else>
        </f:if>
    </div>
</f:section>
